# Documentation schema for learnings written by ce-compound
# Treat this as the canonical frontmatter contract for docs/solutions/.

# --- Track classification ---------------------------------------------------
tracks:
  bug:
    description: "Defects, failures, and errors that were diagnosed and fixed"
    problem_types:
      - build_error
      - test_failure
      - runtime_error
      - performance_issue
      - database_issue
      - security_issue
      - ui_bug
      - integration_issue
      - logic_error
  knowledge:
    description: "Practices, patterns, conventions, decisions, workflow improvements, and documentation"
    problem_types:
      - best_practice
      - documentation_gap
      - workflow_issue
      - developer_experience
      - architecture_pattern
      - design_pattern
      - tooling_decision
      - convention

# --- Fields required by BOTH tracks -----------------------------------------
required_fields:
  module:
    type: string
    description: "Module or area affected"
  date:
    type: string
    pattern: '^\d{4}-\d{2}-\d{2}$'
    description: "Date documented (YYYY-MM-DD)"
  problem_type:
    type: enum
    values:
      - build_error
      - test_failure
      - runtime_error
      - performance_issue
      - database_issue
      - security_issue
      - ui_bug
      - integration_issue
      - logic_error
      - developer_experience
      - workflow_issue
      - best_practice
      - documentation_gap
      - architecture_pattern
      - design_pattern
      - tooling_decision
      - convention
    description: "Primary category"
  component:
    type: enum
    values:
      - rails_model
      - rails_controller
      - rails_view
      - service_object
      - background_job
      - database
      - frontend_stimulus
      - hotwire_turbo
      - email_processing
      - brief_system
      - assistant
      - authentication
      - payments
      - development_workflow
      - testing_framework
      - documentation
      - tooling
    description: "Component involved"
  severity:
    type: enum
    values:
      - critical
      - high
      - medium
      - low
    description: "Impact severity"

# --- Track-specific rules ----------------------------------------------------
track_rules:
  bug:
    required:
      symptoms:
        type: array[string]
        min_items: 1
        max_items: 5
        description: "Observable symptoms"
      root_cause:
        type: enum
        values:
          - missing_association
          - missing_include
          - missing_index
          - wrong_api
          - scope_issue
          - thread_violation
          - async_timing
          - memory_leak
          - config_error
          - logic_error
          - test_isolation
          - missing_validation
          - missing_permission
          - missing_workflow_step
          - inadequate_documentation
          - missing_tooling
          - incomplete_setup
        description: "Fundamental technical cause"
      resolution_type:
        type: enum
        values:
          - code_fix
          - migration
          - config_change
          - test_fix
          - dependency_update
          - environment_setup
          - workflow_improvement
          - documentation_update
          - tooling_addition
          - seed_data_update
        description: "Type of fix applied"
  knowledge:
    optional:
      applies_when:
        type: array[string]
        max_items: 5
      symptoms:
        type: array[string]
        max_items: 5
      root_cause:
        type: enum
        values:
          - missing_association
          - missing_include
          - missing_index
          - wrong_api
          - scope_issue
          - thread_violation
          - async_timing
          - memory_leak
          - config_error
          - logic_error
          - test_isolation
          - missing_validation
          - missing_permission
          - missing_workflow_step
          - inadequate_documentation
          - missing_tooling
          - incomplete_setup
      resolution_type:
        type: enum
        values:
          - code_fix
          - migration
          - config_change
          - test_fix
          - dependency_update
          - environment_setup
          - workflow_improvement
          - documentation_update
          - tooling_addition
          - seed_data_update

# --- Optional fields ---------------------------------------------------------
optional_fields:
  related_components:
    type: array[string]
  tags:
    type: array[string]
    max_items: 8

# --- Validation -------------------------------------------------------------
validation_rules:
  - "Determine track from problem_type"
  - "All shared required_fields must be present"
  - "Bug-track required fields must be present on bug-track docs"
  - "Knowledge-track docs have no additional required fields"
  - "Enum fields must match allowed values exactly"
  - "Array fields must respect min/max counts"
  - "date must match YYYY-MM-DD"
  - "tags should be lowercase and hyphen-separated"
