---
# Documentation schema for docs/solutions/ produced by ce-compound.
# Aligned with the compound-engineering-plugin project's actual conventions.

required_fields:
  title:
    type: string
    description: "Clear problem or learning title"
  date:
    type: string
    pattern: '^\d{4}-\d{2}-\d{2}$'
    description: "Date documented (YYYY-MM-DD). 'created' may be used as a legacy alias when 'date' is absent."
  problem_type:
    type: enum
    values:
      - architecture_pattern
      - best_practice
      - convention
      - design_pattern
      - developer_experience
      - documentation_gap
      - integration_issue
      - skill_design
      - tooling_decision
      - workflow_issue
      - build_error
      - test_failure
      - runtime_error
      - performance_issue
      - database_issue
      - security_issue
      - ui_bug
      - logic_error
    description: >
      Primary category. Use the narrowest applicable value; best_practice is the
      fallback when no narrower knowledge value fits. For actual defects, use one
      of the bug-track values and include the required bug fields below.
  severity:
    type: enum
    values:
      - critical
      - high
      - medium
      - low
      - process
    description: "Impact severity. Use 'process' for documentation, workflow, or tooling issues with no runtime risk."
  tags:
    type: array[string]
    max_items: 8
    description: "Search keywords, lowercase and hyphen-separated"

optional_fields:
  created:
    type: string
    pattern: '^\d{4}-\d{2}-\d{2}$'
    description: "Legacy date alias for docs that predate the 'date' field standard."
  category:
    type: string
    description: "General area or output directory hint (best-practices, skill-design, workflow, integrations, developer-experience)"
  component:
    type: enum
    values:
      - bundling
      - cli
      - codex-target
      - converter-cli
      - development-workflow
      - integrations
      - marketplace
      - markdown-rendering
      - plugin-development
      - release-automation
      - skill-design
      - tooling
    description: "Component or subsystem involved"
  module:
    type: string
    description: "Module or area affected (e.g., src/converters/, plugins/compound-engineering)"
  applies_when:
    type: array[string]
    max_items: 5
    description: "Conditions or situations where this guidance applies"
  root_cause:
    type: string
    description: "Underlying cause. Optional string for knowledge docs; use the bug-track enum for defect docs."
  symptoms:
    type: array[string]
    max_items: 5
    description: "Observable symptoms or friction points"
  resolution_type:
    type: string
    description: "Type of change applied. Optional string for knowledge docs; use the bug-track enum for defect docs."
  related_components:
    type: array[string]
    description: "Other components involved"

# Bug-track fields (required only when problem_type is a defect/bug value)
bug_required_fields:
  symptoms:
    type: array[string]
    min_items: 1
    max_items: 5
    description: "Observable symptoms such as errors or broken behavior"
  root_cause:
    type: enum
    values:
      - missing_association
      - missing_include
      - missing_index
      - wrong_api
      - scope_issue
      - thread_violation
      - async_timing
      - memory_leak
      - config_error
      - logic_error
      - test_isolation
      - missing_validation
      - missing_permission
      - missing_workflow_step
      - inadequate_documentation
      - missing_tooling
      - incomplete_setup
    description: "Fundamental technical cause of the defect"
  resolution_type:
    type: enum
    values:
      - code_fix
      - migration
      - config_change
      - test_fix
      - dependency_update
      - environment_setup
      - workflow_improvement
      - documentation_update
      - tooling_addition
      - seed_data_update
    description: "Type of fix applied"

# Output directory mapping (problem_type -> docs/solutions/ subdirectory)
category_map:
  architecture_pattern: docs/solutions/
  best_practice: docs/solutions/best-practices/
  convention: docs/solutions/
  design_pattern: docs/solutions/
  developer_experience: docs/solutions/developer-experience/
  documentation_gap: docs/solutions/
  integration_issue: docs/solutions/integrations/
  skill_design: docs/solutions/skill-design/
  tooling_decision: docs/solutions/
  workflow_issue: docs/solutions/workflow/
  build_error: docs/solutions/
  test_failure: docs/solutions/
  runtime_error: docs/solutions/
  performance_issue: docs/solutions/
  database_issue: docs/solutions/
  security_issue: docs/solutions/
  ui_bug: docs/solutions/
  logic_error: docs/solutions/

validation_rules:
  - "title, date or created, problem_type, severity, and tags must be present in all docs"
  - "component and module are strongly encouraged for discoverability but not required by the validator"
  - "When problem_type is a bug-track value (build_error, test_failure, runtime_error, performance_issue, database_issue, security_issue, ui_bug, logic_error), symptoms, root_cause (enum), and resolution_type (enum) are required"
  - "When problem_type is a knowledge-track value, symptoms, root_cause, and resolution_type are optional (use string form if included)"
  - "date must match YYYY-MM-DD; 'created' may replace 'date' for legacy docs"
  - "Enum fields must match allowed values exactly"
  - "Array fields must respect min_items/max_items"
  - "tags should be lowercase and hyphen-separated"
  - "Array-of-strings frontmatter items (symptoms, applies_when, tags, related_components) must be wrapped in double quotes when starting with a YAML reserved indicator or containing ': '"
  - "rails_version is not applicable to this project and must not appear in new docs"
